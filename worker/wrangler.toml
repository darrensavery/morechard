name = "morechard-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "CACHE"
# Create once with: wrangler kv namespace create CACHE
# Then replace the placeholder below with the id from that command output.
# For local dev wrangler uses a local KV store automatically — id is still required.
id = "492ab2ef56e647cbbd4bc53fa6b948be"

[[d1_databases]]
binding = "DB"
database_name = "morechard-dev"
# IMPORTANT: this is the DEV database — wrangler dev uses this environment by default.
# Create it once with: wrangler d1 create morechard-dev
# Replace the placeholder below with the real ID from that command output.
database_id = "a6f9fe7d-7e6c-4176-8654-b9d6c83e5cba"

[ai]
binding = "AI"

[browser]
binding = "BROWSER"

[[queues.producers]]
binding = "INCIDENT_QUEUE"
queue = "support-agent-incidents-dev"

[[queues.consumers]]
queue = "support-agent-incidents-dev"
max_batch_size = 5
max_retries = 3

[[r2_buckets]]
binding = "EVIDENCE"
bucket_name = "morechard-evidence"

[[r2_buckets]]
binding = "RECEIPTS"
bucket_name = "morechard-receipts"

[vars]
ENVIRONMENT = "development"
APP_URL = "https://app.morechard.com"
POSTHOG_HOST = "https://eu.i.posthog.com"
# Stripe price IDs — test-mode values (find in Stripe Dashboard → Product catalogue)
STRIPE_PRICE_COMPLETE    = "price_1TPqqZKGVFJVwtJFo37uEPPW"
STRIPE_PRICE_COMPLETE_AI = "price_1TQVUFKGVFJVwtJFmYUryKw6"
STRIPE_PRICE_SHIELD_AI   = "price_1TQVVRKGVFJVwtJFbtozHn3b"
STRIPE_PRICE_AI_UPGRADE  = "price_1TQVViKGVFJVwtJFLhSnEuh7"
# Stripe product ID for Shield AI (used for upgrade credit dynamic pricing)
# Find in Stripe Dashboard → Product catalogue → Morechard Shield AI → copy the prod_... ID
STRIPE_SHIELD_PRODUCT_ID = "prod_UOe8ZtEJmwuNj6"
ZOHO_API_DOMAIN = "https://desk.zoho.com"
ZOHO_ACCOUNTS_DOMAIN = "https://accounts.zoho.com"

# Secrets — set via: wrangler secret put JWT_SECRET
#                    wrangler secret put RESEND_API_KEY
#                    wrangler secret put STRIPE_SECRET_KEY
#                    wrangler secret put STRIPE_WEBHOOK_SECRET
#                    wrangler secret put POSTHOG_API_KEY
#                    wrangler secret put OPENAI_API_KEY
#                    wrangler secret put ADMIN_SECRET
# Do NOT put real values here. This file is committed to git.
# For local dev, add to .dev.vars (see .dev.vars.example)

# ── Cron triggers ────────────────────────────────────────────────────────────
# All run through the same scheduled() handler in index.ts:
#   "0 8 * * 6" — Saturday 08:00 UTC: payday sweep + governance expiry
#   "0 3 * * 1" — Monday  03:00 UTC: market rate aggregation
#   "0 6 * * *" — Daily   06:00 UTC: marketing re-engagement emails
#   "0 0 * * *" — Daily   00:00 UTC: demo family nightly reset (Thomson)
#                                    + Learning Lab passive-unlock sweep (inactivity/balance/streak)
#   "*/5 * * * *" — Every 5 minutes:  Zoho Desk ticket poll (support agent ingestion)
[triggers]
crons = ["0 8 * * 6", "0 3 * * 1", "0 6 * * *", "0 0 * * *", "*/5 * * * *"]

# ── Production environment ────────────────────────────────────────────────────
# GitHub Actions (.github/workflows/worker-deploy.yml) handles this automatically
# on every push, using the blue/green flow below. To do it by hand:
#
#   npm run deploy:preview   # uploads a new version, does NOT go live — gives you
#                             # a private preview URL against the REAL production DB
#   npm run deploy:promote   # shifts 100% of live traffic to that version instantly
#
# Old one-shot method (still works, but skips the safety net above):
#   npx wrangler deploy --env production
[env.production]
name = "morechard-api"
vars = { ENVIRONMENT = "production", APP_URL = "https://app.morechard.com", WORKER_URL = "https://api.morechard.com", POSTHOG_HOST = "https://eu.i.posthog.com", STRIPE_PRICE_COMPLETE = "price_REPLACE_WITH_LIVE_COMPLETE", STRIPE_PRICE_COMPLETE_AI = "price_REPLACE_WITH_LIVE_COMPLETE_AI", STRIPE_PRICE_SHIELD_AI = "price_REPLACE_WITH_LIVE_SHIELD_AI", STRIPE_PRICE_AI_UPGRADE = "price_REPLACE_WITH_LIVE_AI_UPGRADE", STRIPE_SHIELD_PRODUCT_ID = "prod_REPLACE_WITH_LIVE_SHIELD_PRODUCT_ID", ZOHO_API_DOMAIN = "https://desk.zoho.com", ZOHO_ACCOUNTS_DOMAIN = "https://accounts.zoho.com" }

[[env.production.kv_namespaces]]
binding = "CACHE"
# Create once with: wrangler kv namespace create CACHE --env production
# Then replace the placeholder below with the id from that command output.
id = "a86dd61fe3d440f689b8450898c51972"

[[env.production.d1_databases]]
binding = "DB"
database_name = "morechard"
database_id = "5e8b4cd3-4807-43e4-bd84-4969da6e402c"

[[env.production.r2_buckets]]
binding = "EVIDENCE"
bucket_name = "morechard-evidence"

[[env.production.r2_buckets]]
binding = "RECEIPTS"
bucket_name = "morechard-receipts"

[[env.production.queues.producers]]
binding = "INCIDENT_QUEUE"
queue = "support-agent-incidents"

[[env.production.queues.consumers]]
queue = "support-agent-incidents"
max_batch_size = 5
max_retries = 3

[env.production.ai]
binding = "AI"

[env.production.browser]
binding = "BROWSER"
