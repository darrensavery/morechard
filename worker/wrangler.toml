name = "morechard-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "morechard"
database_id = "5e8b4cd3-4807-43e4-bd84-4969da6e402c"

[ai]
binding = "AI"

[[r2_buckets]]
binding = "EVIDENCE"
bucket_name = "morechard-evidence"

[[r2_buckets]]
binding = "RECEIPTS"
bucket_name = "morechard-receipts"

[vars]
ENVIRONMENT = "development"
APP_URL = "https://app.morechard.com"
FIREBASE_PROJECT_ID = "pocket-money-85878"
POSTHOG_HOST = "https://eu.i.posthog.com"

# Secrets — set via: wrangler secret put JWT_SECRET
#                    wrangler secret put RESEND_API_KEY
#                    wrangler secret put STRIPE_SECRET_KEY
#                    wrangler secret put STRIPE_WEBHOOK_SECRET
#                    wrangler secret put POSTHOG_API_KEY
#                    wrangler secret put OPENAI_API_KEY
# Do NOT put real values here. This file is committed to git.
# For local dev, add to .dev.vars (see .dev.vars.example)

# ── Cron triggers ────────────────────────────────────────────────────────────
# All run through the same scheduled() handler in index.ts:
#   "0 8 * * 6" — Saturday 08:00 UTC: payday sweep + governance expiry
#   "0 3 * * 1" — Monday  03:00 UTC: market rate aggregation
#   "0 6 * * *" — Daily   06:00 UTC: marketing re-engagement emails
#   "0 0 * * *" — Daily   00:00 UTC: demo family nightly reset (Thomson)
[triggers]
crons = ["0 8 * * 6", "0 3 * * 1", "0 6 * * *", "0 0 * * *"]

# ── Production environment ────────────────────────────────────────────────────
# Deploy with: wrangler deploy --env production
[env.production]
name = "morechard-api"
vars = { ENVIRONMENT = "production", APP_URL = "https://app.morechard.com", WORKER_URL = "https://api.morechard.com", FIREBASE_PROJECT_ID = "pocket-money-85878", POSTHOG_HOST = "https://eu.i.posthog.com" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "morechard"
database_id = "5e8b4cd3-4807-43e4-bd84-4969da6e402c"

[[env.production.r2_buckets]]
binding = "EVIDENCE"
bucket_name = "morechard-evidence"

[[env.production.r2_buckets]]
binding = "RECEIPTS"
bucket_name = "morechard-receipts"

[env.production.ai]
binding = "AI"
