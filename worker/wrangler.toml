name = "morechard-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "morechard"
database_id = "5e8b4cd3-4807-43e4-bd84-4969da6e402c"

[vars]
ENVIRONMENT = "development"
APP_URL = "https://morechard.com"
FIREBASE_PROJECT_ID = "pocket-money-85878"

# Secrets — set via: wrangler secret put JWT_SECRET
#                    wrangler secret put RESEND_API_KEY
#                    wrangler secret put STRIPE_SECRET_KEY
#                    wrangler secret put STRIPE_WEBHOOK_SECRET
# Do NOT put real values here. This file is committed to git.
# For local dev, add to .dev.vars (see .dev.vars.example)

# ── Production environment ────────────────────────────────────────────────────
# Deploy with: wrangler deploy --env production
[env.production]
name = "morechard-api"
vars = { ENVIRONMENT = "production", APP_URL = "https://morechard.com" }
