<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#00959c" id="meta-theme-color" />
    <!-- Anti-flicker: resolve theme before first paint so there is no white flash.
         Runs synchronously — must stay inline and before any stylesheet. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('mc_theme') || 'system';
          var teenMode = 0;
          try {
            var raw = localStorage.getItem('mc_teen_mode');
            if (raw !== null) teenMode = parseInt(raw, 10) || 0;
          } catch (_) {}

          var resolved = stored;
          if (stored === 'system') {
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            // teen_mode defaults new sessions to dark when system is ambiguous
            resolved = (prefersDark || teenMode === 1) ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', resolved);
          // Keep <meta name="theme-color"> in sync
          var metaThemeColor = document.getElementById('meta-theme-color');
          if (metaThemeColor) {
            metaThemeColor.setAttribute('content', resolved === 'dark' ? '#1b2d2e' : '#00959c');
          }
        } catch (_) {}
      })();
    </script>
