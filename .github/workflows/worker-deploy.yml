name: Worker — Version Upload & Deploy

# What this does, in plain terms:
#
#   On every push/PR that touches worker/**  -> uploads a new "version" of the
#     Worker. This does NOT go live. It's a snapshot you can test against the
#     REAL production database, at its own private preview URL, before anyone
#     else sees it (the "green" environment).
#
#   Only on a push to main -> after uploading, it also PROMOTES that version
#     to 100% of live traffic (the "swap the sign over" moment — old code
#     stops serving requests, new code takes over instantly).
#
# Requires two repo secrets (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN    — a Cloudflare API token scoped to Workers Scripts (Edit)
#   CLOUDFLARE_ACCOUNT_ID   — f74f3a3fd6fb39667d6d5e3e514777d5 (this account)

on:
  push:
    branches: ['**']
    paths: ['worker/**']
  pull_request:
    paths: ['worker/**']

jobs:
  # Runs for every push/PR. Uploads a new version and prints its preview URL.
  # Never touches live traffic.
  preview:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install worker dependencies
        working-directory: worker
        run: npm ci

      - name: Upload preview version (no traffic shift)
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RAW_REF: ${{ github.head_ref || github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          SAFE_REF=$(printf '%s' "$RAW_REF" | tr -c 'a-zA-Z0-9' '-' | cut -c1-28)
          OUTPUT=$(npx wrangler versions upload --env production \
            --preview-alias "pr-$SAFE_REF" \
            --message "Preview for $COMMIT_SHA" 2>&1 | tee /dev/stderr)
          VERSION_ID=$(echo "$OUTPUT" | grep -oE 'Worker Version ID:[[:space:]]*[a-f0-9-]+' | grep -oE '[a-f0-9-]{36}' || true)
          {
            echo "### Worker preview deployed"
            echo "- Preview alias: \`pr-$SAFE_REF\`"
            echo "- Version ID: \`${VERSION_ID:-unknown}\`"
            echo ""
            echo "This version is live at its own preview URL, running against the **real production database**. It is NOT receiving any normal user traffic."
          } >> "$GITHUB_STEP_SUMMARY"

  # Runs only when a branch is merged into main. Uploads a new version AND
  # immediately promotes it to 100% of live traffic.
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install worker dependencies
        working-directory: worker
        run: npm ci

      - name: Upload version
        id: upload
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          OUTPUT=$(npx wrangler versions upload --env production \
            --message "main @ $COMMIT_SHA" 2>&1 | tee /dev/stderr)
          VERSION_ID=$(echo "$OUTPUT" | grep -oE 'Worker Version ID:[[:space:]]*[a-f0-9-]+' | grep -oE '[a-f0-9-]{36}' || true)
          if [ -z "$VERSION_ID" ]; then
            echo "Could not parse a Worker Version ID from wrangler output — aborting before promoting anything." >&2
            exit 1
          fi
          echo "version_id=$VERSION_ID" >> "$GITHUB_OUTPUT"

      - name: Promote version to 100% of live traffic
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler versions deploy "${{ steps.upload.outputs.version_id }}@100" --yes --env production
