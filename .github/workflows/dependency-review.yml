name: Dependency Review

# Blocks a PR if it introduces a dependency with a known vulnerability or an
# incompatible license — checked against the diff of the PR only (fast),
# complementing the broader but non-blocking npm-audit sweep in
# dependency-audit.yml.

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
